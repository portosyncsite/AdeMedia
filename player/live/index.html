  <style>
 /* ========== ROOT ========== */

:root{
  --bg1:#120800;
  --bg2:#2a1200;

  --glass: rgba(255,255,255,0.08);
  --glass-strong: rgba(255,255,255,0.12);

  --border: rgba(255,255,255,0.10);

  --text: rgba(255,255,255,0.92);

  --shadow: 0 25px 80px rgba(0,0,0,0.55);

  --radius: 26px;

  --orange1:#ff9500;
  --orange2:#ffb347;

  --transition: 0.35s cubic-bezier(.22,.61,.36,1);
}

/* ========== RESET ========== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* ========== BODY FIX CENTER ========== */

body{

  font-family:"Poppins",sans-serif;

  color:var(--text);

  min-height:100vh;

  overflow-x:hidden;

  display:flex;

  flex-direction:column;

  align-items:center; /* 🔥 asta repară tot centratul */

  background:

    radial-gradient(700px circle at 10% 10%, #ffb300 0%, transparent 55%),

    radial-gradient(600px circle at 90% 20%, #ff6a00 0%, transparent 60%),

    radial-gradient(800px circle at 50% 100%, #2a1200 0%, transparent 65%),

    linear-gradient(180deg, var(--bg1), var(--bg2));
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
    filter: blur(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }
}

@keyframes glowPulse {
  0%,100% { box-shadow: 0 25px 70px rgba(0,0,0,0.55); }
  50% { box-shadow: 0 35px 100px rgba(255,140,0,0.18); }
}

/* ========== HEADER ========== */

header{
  position:sticky;
  top:14px;

  width:min(1200px,92%);
  margin:18px auto;

  z-index:999;

  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.10),
    rgba(255,255,255,0.04)
  );

  border:1px solid var(--border);

  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);

  border-radius:22px;

  box-shadow: var(--shadow);
}

.header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:30px 26px;

  position:relative;
}

.header-left,
.header-right{
  display:flex;
  gap:18px;
}

header a{
  color:rgba(255,255,255,0.9);
  text-decoration:none;
  font-weight:600;
  font-size:.95rem;

  transition:var(--transition);
}

header a:hover{
  transform:translateY(-1px);
  color:#fff;
}

.header-center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

.header-center img{
  height:50px;
  transition:var(--transition);
}

.header-center img:hover{
  transform:scale(1.05);
}

/* =========================

   MODERN PLAYER

========================= */

.player{

  width:min(92%, 1100px);

  margin-top:34px;

  border-radius:34px;

  overflow:hidden;

  position:relative;

  background:

    linear-gradient(

      135deg,

      rgba(255,255,255,0.10),

      rgba(255,255,255,0.03)

    );

  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter: blur(22px);

  -webkit-backdrop-filter: blur(22px);

  box-shadow:

    0 35px 100px rgba(0,0,0,0.65),

    0 0 80px rgba(255,140,0,0.08);

  animation:fadeUp .7s ease;

}

.player::before{

  content:"";

  position:absolute;

  inset:0;

  background:

    linear-gradient(

      135deg,

      rgba(255,140,0,0.18),

      transparent 45%

    );

  pointer-events:none;

  z-index:1;

}

video{

  width:100%;

  aspect-ratio:16/9;

  display:block;

  background:#000;

  border:none;

  position:relative;

  z-index:0;

}

/* =========================
   CHANNEL BAR PREMIUM V2 (UPDATED)
========================= */

.channel-container{
  width:90%;
  max-width:1100px;

  min-height:140px; /* ↓ mai compact */

  margin-top:28px;

  position:relative;
  overflow:hidden;

  display:flex;
  align-items:stretch;

  border-radius:34px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,0.08),
      rgba(255,255,255,0.03)
    );

  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);

  box-shadow:
    0 30px 90px rgba(0,0,0,0.60),
    inset 0 1px 0 rgba(255,255,255,0.08);

  transition:
    transform .45s cubic-bezier(.22,.61,.36,1),
    box-shadow .45s cubic-bezier(.22,.61,.36,1);

  isolation:isolate;
}

.channel-container:hover{
  transform:translateY(-8px) scale(1.01);

  box-shadow:
    0 45px 120px rgba(0,0,0,0.75),
    0 0 80px rgba(255,140,0,0.12);
}

/* animated glow */
.channel-container::before{
  content:"";

  position:absolute;
  inset:-2px;

  border-radius:inherit;

  background:
    linear-gradient(
      135deg,
      rgba(255,140,0,0.55),
      transparent,
      rgba(255,180,70,0.35)
    );

  opacity:.45;

  filter:blur(18px);

  z-index:-2;

  animation: glowMove 8s linear infinite;
}

@keyframes glowMove{
  0%{ transform:translateX(-8%); }
  50%{ transform:translateX(8%); }
  100%{ transform:translateX(-8%); }
}

/* LEFT SIDE IMAGE */
.channel-bg{
  width:42%;
min-width:42%;

position:absolute;
inset:0;

width:100%;
height:100%;

  object-fit:cover;

    brightness(1.05)

    saturate(1.05)

    contrast(1.02);

  transform:scale(1.03);

  transition:
    transform 1.1s ease,
    filter .5s ease;
}

.channel-container:hover .channel-bg{
  transform:scale(1.08);

  filter:

    brightness(1.12)

    saturate(1.08)

    contrast(1.04);
}

/* cinematic fade */
.channel-container::after{
  content:"";

  position:absolute;

  left:30%;
  top:0;
  bottom:0;
  width:40%;

  background:

    linear-gradient(

      90deg,

      transparent,

      rgba(0,0,0,0.15),

      rgba(0,0,0,0.35)

    );

  z-index:1;

  pointer-events:none;
}

/* RIGHT PANEL */
.channel-info{
  position:relative;
  z-index:2;

  flex:1;

  display:flex;
  flex-direction:column;
  justify-content:center;


  padding:38px 120px 38px 40px; /* 👈 spațiu extra pentru arrows */

  background:

    linear-gradient(

      135deg,

      rgba(0,0,0,0.18),

      rgba(0,0,0,0.35)

    )

  backdrop-filter: blur(1px);
}

/* optional separation fade spre arrows */
.channel-info::after{
  content:"";
  position:absolute;
  right:0;
  top:0;
  bottom:0;
  width:90px;

  background:linear-gradient(
    to right,
    transparent,
    rgba(0,0,0,0.35)
  );
  pointer-events:none;
}

/* logo */
.channel-logo{
  position:absolute;

  left:28px;
  top:50%;

  transform:translateY(-50%);

  width:110px;
  height:110px;


  object-fit:contain;

  z-index:3;

  padding:16px;

  border-radius:28px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,0.10),
      rgba(255,255,255,0.04)
    );

  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter: blur(14px);

  box-shadow:
    0 20px 45px rgba(0,0,0,0.45);

  transition:
    transform .45s ease,
    box-shadow .45s ease;
}

.channel-container:hover .channel-logo{
  transform:translateY(-50%) scale(1.06) rotate(-2deg);

  box-shadow:
    0 30px 70px rgba(0,0,0,0.65),
    0 0 35px rgba(255,140,0,0.20);
}

/* TEXTS */
.channel-name{
  font-size:2rem;
  font-weight:800;

  letter-spacing:-0.03em;

  color:#fff;

  margin-left:120px;

  text-shadow:0 5px 25px rgba(0,0,0,0.75);
}

.channel-theme{
  margin-top:10px;

  margin-left:120px;

  font-size:.95rem;
  font-weight:500;

  color:rgba(255,255,255,0.65);

  letter-spacing:.18em;
}

/* ARROWS */
.arrows{
  position:absolute;

  right:34px; /* 👈 ușor mai aerisit */
  top:50%;

  transform:translateY(-50%);

  display:flex;
  gap:18px; /* 👈 mai spațiat */

  z-index:5;
}

.arrow-left,
.arrow-right{
  width:58px;
  height:58px;

  padding:14px;

  border-radius:18px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,0.14),
      rgba(255,255,255,0.05)
    );

  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter: blur(14px);

  fill:white;

  cursor:pointer;

  transition:
    transform .35s ease,
    background .35s ease; /* FIXED (fără virgulă bug) */
}

.arrow-left:hover,
.arrow-right:hover{
  transform:scale(1.08);

  background:
    linear-gradient(
      135deg,
      rgba(255,140,0,0.40),
      rgba(255,180,70,0.18)
    );
}

/* MOBILE */
@media(max-width:900px){

  .channel-container{
    flex-direction:column;
    min-height:auto;
  }

  .channel-bg{
    width:100%;
    height:220px;
  }

  .channel-container::after{
    display:none;
  }

  .channel-logo{
    position:relative;
    left:auto;
    top:auto;
    transform:none;
    margin:22px auto 0;
  }

  .channel-container:hover .channel-logo{
    transform:scale(1.04);
  }

  .channel-info{
    padding:25px;
    text-align:center;
    align-items:center;
  }

  .channel-name,
  .channel-theme{
    margin-left:0;
  }

  .channel-name{
    font-size:1.5rem;
  }

  .arrows{
    position:relative;
    right:auto;
    top:auto;
    transform:none;
    justify-content:center;
    padding:0 0 24px;
  }
}

.progress-bar{

/* =========================

   MODERN QUALITY SELECTOR

========================= */

.quality-selector{

  margin-top:22px;

  display:flex;

  align-items:center;

  justify-content:center;

  gap:14px;

  padding:14px 20px;

  border-radius:22px;

  background:

    );

  border:1px solid rgba(255,255,255,0.08);

}

.quality-selector label{

  font-size:.88rem;

  color:rgba(255,255,255,0.8);

}

.quality-selector select{

  appearance:none;

  border:none;

  min-width:170px;

  font-family:"Poppins",sans-serif;

  font-size:.92rem;

  font-weight:600;

  color:white;

  background:

    linear-gradient(

      135deg,

      rgba(255,255,255,0.14),

      rgba(255,255,255,0.05)

  border:1px solid rgba(255,255,255,0.08);

  cursor:pointer;

  transition:all .3s ease;

}

.quality-selector select:hover{

  transform:translateY(-2px);

  background:

      rgba(255,180,70,0.12)

    );

}

.quality-selector option{

}

const epgTime = document.getElementById("epgTime");
const epgDescription = document.getElementById("epgDescription");
const epgProgress = document.getElementById("epgProgress");
const epgNextList = document.getElementById("epgNextList");

const EPG_API = "https://api.ademedia.ro/api/v1/epg/read/";

/* ================= QUALITY CHANGE (IMPORTANT FIX) ================= */

qualitySelect.addEventListener("change", () => {
  loadChannel(currentIndex, qualitySelect.value);
});

/* ================= LOAD CHANNEL ================= */

function loadChannel(index, selectedQuality = null) {
  const c = channels[index];

  nameEl.textContent = `${index + 1}. ${c.name}`;
  themeEl.textContent = c.theme;

  const channelBox = document.getElementById("channelBox");

if (c.bg && c.bg.includes("gradient")) {

  channelBox.classList.add("gradient-mode");

  bgEl.style.display = "none";

  channelBox.style.background = c.bg;

} else {

  channelBox.classList.remove("gradient-mode");

  channelBox.style.background = "";

  bgEl.style.display = "block";

  bgEl.src = c.bg || "";

}
  logoEl.src = c.logo || "";

  loadEPG(c);

  const qualities = c.streams ? Object.keys(c.streams) : ["Default"];

  qualityBox.style.display = "flex";

  qualitySelect.innerHTML = "";
  qualities.forEach(q => {
    const opt = document.createElement("option");
    opt.value = q;
    opt.textContent = q;
    qualitySelect.appendChild(opt);
  });

  const quality = selectedQuality || qualities[0];
  qualitySelect.value = quality;

  const streamUrl =
    (c.streams && c.streams[quality]) ||
    c.stream ||
    FALLBACK_VIDEO;

  /* ================= AUDIO ================= */

  if (c.type === "audio") {
    if (hls) {
      hls.destroy();
      hls = null;
    }

    video.pause();
    video.removeAttribute("src");
    video.load();

    document.getElementById("videoWrapper").style.display = "none";
    document.getElementById("audioWrapper").style.display = "block";

    audio.src = streamUrl;
    audio.play().catch(() => {});
    return;
  }

  /* ================= VIDEO ================= */

  document.getElementById("audioWrapper").style.display = "none";
  document.getElementById("videoWrapper").style.display = "block";

  audio.pause();

  if (hls) {
    hls.destroy();
    hls = null;
  }

  if (Hls.isSupported() && streamUrl.includes(".m3u8")) {
    hls = new Hls({ enableWorker: true });

    hls.loadSource(streamUrl);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(() => {});
    });

    hls.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        video.src = FALLBACK_VIDEO;
        video.play().catch(() => {});
      }
    });

  } else {
    video.src = streamUrl;
  }
}

/* ================= EPG ================= */

function getChannelKey(channel) {
  const stream =
    channel.stream ||
    Object.values(channel.streams || {})[0];

  if (!stream) return null;

  try {
    const url = new URL(stream);
    let last = url.pathname.split("/").pop();
    return last?.replace(".m3u8", "") || null;
  } catch {
    return null;
  }
}

async function loadEPG(channel) {
  const key = getChannelKey(channel);
  if (!key) return;

  try {
    const res = await fetch(`${EPG_API}${key}`);
    const data = await res.json();
    renderEPG(data);
  } catch {
    epgTitle.textContent = "EPG indisponibil";
  }
}

function renderEPG(data) {
  const now = data.acum || {};
  const next = data.next1 || {};

  epgTitle.textContent = now.title || "N/A";
  epgTime.textContent = `${now.start || "--"} - ${now.end || "--"}`;
  epgDescription.textContent = now.description || "";

  epgNextList.innerHTML = "";

  if (next.title) {
    const div = document.createElement("div");
    div.className = "epg-next-item";
    div.innerHTML = `
      <div class="epg-next-hour">${next.start} - ${next.end}</div>
      <div class="epg-next-name">${next.title}</div>
    `;
    epgNextList.appendChild(div);
  }
}

/* ================= NAV ================= */

nextBtn.addEventListener("click", () => {
  currentIndex = (currentIndex + 1) % channels.length;
  loadChannel(currentIndex);
});

prevBtn.addEventListener("click", () => {
  currentIndex = (currentIndex - 1 + channels.length) % channels.length;
  loadChannel(currentIndex);
});
